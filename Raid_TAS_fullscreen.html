<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RAID // Tactical Arcade Shooter</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    background: #060a10;
    overflow: hidden;
    touch-action: none;
    user-select: none;
    font-family: 'Share Tech Mono', monospace;
    color: #e0f0ff;
  }

  #game-container {
    position: relative;
    width: 100vw; height: 100vh;
    overflow: hidden;
  }

  canvas {
    display: block;
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }

  /* ── HUD ─────────────────────────────────────────────────────── */
  #hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 16px;
    pointer-events: none;
    z-index: 10;
    background: #060a10;
  }
  .hud-block { display: flex; flex-direction: row; align-items: center; gap: 6px; }
  .hud-label { font-size: 7px; letter-spacing: 2px; color: #2a6a9a; text-transform: uppercase; }
  .hud-value { font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 700; color: #00cfff; text-shadow: 0 0 10px rgba(0,207,255,0.5); }
  .hud-value.danger       { color: #ff3a3a; text-shadow: 0 0 10px rgba(255,60,60,0.5); }
  .hud-value.warning      { color: #ffaa00; text-shadow: 0 0 10px rgba(255,170,0,0.5); }
  .hud-value.hearts-full     { color: #40ff70; text-shadow: 0 0 10px rgba(60,255,100,0.6); }
  .hud-value.hearts-one-down { color: #ffcc00; text-shadow: 0 0 10px rgba(255,200,0,0.5); }
  .hud-value.hearts-last     { color: #ff3a3a; text-shadow: 0 0 10px rgba(255,60,60,0.6); }

  /* ── Wave announce ───────────────────────────────────────────── */
  #wave-announce {
    position: absolute; top: calc(40px + 35%); left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(18px, 5vw, 28px); font-weight: 900;
    color: #ffcc00; text-shadow: 0 0 30px rgba(255,200,0,0.8);
    letter-spacing: 6px; pointer-events: none; z-index: 20;
    opacity: 0; transition: opacity 0.3s; white-space: nowrap;
  }

  /* ── Start / Game-over overlay ───────────────────────────────── */
  #overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(4,8,16,0.93);
    z-index: 40;
  }
  #overlay h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(28px, 8vw, 48px);
    font-weight: 900; letter-spacing: 10px;
    color: #00cfff; text-shadow: 0 0 40px rgba(0,207,255,0.8);
    margin-bottom: 6px;
  }
  .subtitle { font-size: 10px; letter-spacing: 4px; color: #2a6a9a; margin-bottom: 32px; }
  #start-btn {
    font-family: 'Orbitron', sans-serif; font-size: 13px; letter-spacing: 4px;
    padding: 16px 44px; background: transparent;
    border: 2px solid #00cfff; color: #00cfff; cursor: pointer;
    text-transform: uppercase; box-shadow: 0 0 20px rgba(0,207,255,0.2);
  }
  #start-btn:active { background: rgba(0,207,255,0.15); }

  /* ── High score ladder ───────────────────────────────────────── */
  .hs-table {
    width: min(300px, 88vw);
    border-collapse: collapse;
    font-size: 11px;
    margin-bottom: 20px;
  }
  .hs-table th {
    font-size: 7px; letter-spacing: 3px; color: #2a6a9a;
    text-align: left; padding: 0 0 6px;
    border-bottom: 1px solid #1a3a50;
  }
  .hs-table th.num { text-align: right; }
  .hs-table td {
    padding: 5px 0;
    color: #c0d8e8;
    border-bottom: 1px solid rgba(30,74,112,0.25);
  }
  .hs-table td.num  { text-align: right; font-family: 'Orbitron', sans-serif; font-size: 10px; }
  .hs-table td.rank { color: #2a6a9a; width: 24px; }
  .hs-table td.name { letter-spacing: 3px; font-family: 'Orbitron', sans-serif; font-size: 11px; }
  .hs-table tr.hs-new td     { color: #ffcc00; text-shadow: 0 0 8px rgba(255,200,0,0.6); }
  .hs-table tr.hs-current td { color: #00cfff; }

  /* ── Initials entry wheel ────────────────────────────────────── */
  .initials-entry {
    display: flex; flex-direction: column; align-items: center;
    gap: 12px; margin-bottom: 24px;
  }
  .initials-label { font-size: 8px; letter-spacing: 4px; color: #2a6a9a; }
  .initials-wheel { display: flex; gap: 12px; }
  .initial-col {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .initial-col button {
    background: transparent; border: 1px solid #1e4a70;
    color: #2a6a9a; font-size: 14px; width: 36px; height: 28px;
    cursor: pointer; line-height: 1;
  }
  .initial-col button:active { background: rgba(0,207,255,0.1); color: #00cfff; }
  .initial-char {
    font-family: 'Orbitron', sans-serif; font-size: 22px; font-weight: 700;
    color: #ffcc00; text-shadow: 0 0 12px rgba(255,200,0,0.7);
    width: 36px; text-align: center; line-height: 1;
    border-bottom: 2px solid #ffcc00; padding-bottom: 2px;
  }
  .hs-confirm {
    font-family: 'Orbitron', sans-serif; font-size: 11px; letter-spacing: 3px;
    padding: 10px 28px; background: transparent;
    border: 1px solid #ffcc00; color: #ffcc00; cursor: pointer;
  }
  .hs-confirm:active { background: rgba(255,200,0,0.1); }
  .tap-continue {
    font-size: 9px; letter-spacing: 4px; color: #2a6a9a;
    margin-top: 8px; animation: blink 1.2s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* ── Mission report ──────────────────────────────────────────── */
  .report { width: min(340px, 90vw); margin-bottom: 28px; }
  .report-header {
    display: flex; justify-content: space-between;
    font-size: 9px; letter-spacing: 3px; color: #2a6a9a;
    text-transform: uppercase; margin-bottom: 10px;
    padding-bottom: 6px; border-bottom: 1px solid #1e4a70;
  }
  .kill-table {
    width: 100%; border-collapse: collapse;
    font-size: 11px; letter-spacing: 1px;
  }
  .kill-table th {
    font-size: 7px; letter-spacing: 3px; color: #2a6a9a;
    text-align: left; padding: 0 0 6px;
    border-bottom: 1px solid #1a3a50;
  }
  .kill-table td {
    padding: 5px 0; color: #c0d8e8;
    border-bottom: 1px solid rgba(30,74,112,0.3);
  }
  .kill-table .num { text-align: right; font-family: 'Orbitron', sans-serif; font-size: 11px; }
  .kill-table .dim { color: #2a6a9a; font-size: 9px; }
  .kill-table .bonus-row td { color: #ffcc00; border-bottom: 1px solid rgba(255,200,0,0.2); }
  .kill-table tfoot .total-row td {
    padding-top: 10px; color: #00cfff;
    font-family: 'Orbitron', sans-serif; font-size: 13px; font-weight: 700;
    letter-spacing: 2px; border-top: 1px solid #1e4a70; border-bottom: none;
    text-shadow: 0 0 10px rgba(0,207,255,0.5);
  }
</style>
</head>
<body>
<div id="game-container">
  <canvas id="canvas"></canvas>

  <div id="hud">
    <div class="hud-block">
      <div class="hud-label">HP</div>
      <div class="hud-value" id="hud-lives"></div>
    </div>
    <div class="hud-block" style="align-items:center">
      <div class="hud-label">KILLS</div>
      <div class="hud-value" id="hud-kills">0</div>
    </div>
    <div class="hud-block" style="align-items:center">
      <div class="hud-label">LVL</div>
      <div class="hud-value" id="hud-level">1</div>
    </div>
    <div class="hud-block" style="align-items:center">
      <div class="hud-label">FOES</div>
      <div class="hud-value" id="hud-foes">0</div>
    </div>
    <div class="hud-block" style="align-items:flex-end">
      <div class="hud-label">SCORE</div>
      <div class="hud-value" id="hud-score">00000000</div>
    </div>
  </div>

  <div id="wave-announce"></div>

  <div id="overlay">
    <h1>RAID</h1>
    <div class="subtitle">// TACTICAL ARCADE SHOOTER //</div>
    <button id="start-btn">INITIATE RAID</button>
  </div>
</div>

<script>
// ┌─────────────────────────────────────────────────────────────────┐
// │  SECTION 1 — DOM REFERENCES                                     │
// └─────────────────────────────────────────────────────────────────┘
const canvas       = document.getElementById('canvas');
const ctx          = canvas.getContext('2d');
const overlay      = document.getElementById('overlay');
const hudLives     = document.getElementById('hud-lives');
const hudScore     = document.getElementById('hud-score');
const hudFoes      = document.getElementById('hud-foes');
const hudKills     = document.getElementById('hud-kills');
const hudLevel     = document.getElementById('hud-level');
const waveAnnounce = document.getElementById('wave-announce');


// ┌─────────────────────────────────────────────────────────────────┐
// │  SECTION 2 — CONSTANTS & CONFIG                                 │
// └─────────────────────────────────────────────────────────────────┘

// ── Grid ──────────────────────────────────────────────────────────
const COLS = 32;
const ROWS = 20;

// ── Layout (fixed px) ─────────────────────────────────────────────
// HUD_H  : DOM bar at top — canvas draws its own bezel behind it.
// CTRL_H : Touch control panel at bottom.
const HUD_H  = 40;
const CTRL_H = 200;

// ── Spawn points ──────────────────────────────────────────────────
const PLAYER_SPAWN = { col: 1, row: 1 };
const ENEMY_SPAWNS = [
  { col: COLS - 3,                  row: 1        },  // top-right
  { col: 1,                         row: ROWS - 3 },  // bottom-left
  { col: COLS - 3,                  row: ROWS - 3 },  // bottom-right
  { col: Math.floor(COLS / 2) - 1, row: 1        },  // top-center
  { col: Math.floor(COLS / 2) - 1, row: ROWS - 3 },  // bottom-center
];
const SPAWN_CLEAR_RADIUS = 2;

// ── Map generation ────────────────────────────────────────────────
const MIN_ROOM        = 3;
const MAX_ROOM        = 6;
const MAX_ROOMS       = 8;
const EXTRA_CORRIDORS = 2;

// ── Pathfinding ───────────────────────────────────────────────────
const PATH_INTERVAL = 0.35; // seconds between path recalculations

// ── Enemy points ──────────────────────────────────────────────────
const ENEMY_POINTS = { regular: 100, elite: 150, tank: 300 };

// ── Enemy rendering palettes ──────────────────────────────────────
const ENEMY_PALETTE = {
  regular: { idle:'#7a2215', chase:'#cc1a00', nub:'#ff6040', glow:'#ff2000', range:'255,60,20'  },
  elite:   { idle:'#7a1560', chase:'#cc0099', nub:'#ff40cc', glow:'#ff00aa', range:'255,20,160' },
  tank:    { idle:'#1a3a1a', chase:'#1a6a1a', nub:'#40ff60', glow:'#00ff40', range:'40,200,80'  },
};

// ── Squad distribution per level [regular, elite, tank] ──
const SQUAD_TABLE = {
   1: [3, 0, 0],  2: [3, 1, 0],  3: [3, 1, 1],  4: [3, 2, 1],
   5: [3, 2, 2],  6: [4, 2, 2],  7: [4, 3, 2],  8: [4, 3, 3],
   9: [4, 3, 3], 10: [4, 3, 3],
};

// ── High score storage ────────────────────────────────────────────
const HS_KEY   = 'raid_hiscores_v1';
const HS_MAX   = 10;
const HS_CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';


// ┌─────────────────────────────────────────────────────────────────┐
// │  SECTION 3 — LAYOUT  (tile-derived, rebuilt on every resize)   │
// └─────────────────────────────────────────────────────────────────┘
let VW, VH;
let TILE;         // px per tile
let BASE_W;       // COLS * TILE
let BASE_H;       // ROWS * TILE
let SPATIAL_CELL; // spatial-hash bucket size

// Touch control panel geometry
let CTRL_PAD, STICK_BASE_R, KNOB_R, FIRE_R, PAUSE_R, STICK_MAX_R;

// Weapon stats — rebuilt when TILE changes (ranges are TILE multiples)
let RANGE_BONUS;
let WEAPONS;

function buildTileConstants() {
  RANGE_BONUS  = TILE * 1.0;
  SPATIAL_CELL = TILE * 4;
  WEAPONS = {
    pistol:  { range: TILE * 6.7,  fireRate: 0.85, spread: 0.07, pellets: 1, bulletSpeed: TILE * 12.5 },
    rifle:   { range: TILE * 7.9,  fireRate: 0.3,  spread: 0.05, pellets: 1, bulletSpeed: TILE * 13.3 },
    shotgun: { range: TILE * 3.3,  fireRate: 1.0,  spread: 0.12, pellets: 3, bulletSpeed: TILE * 12.5 },
  };
}

function buildCtrlConstants() {
  CTRL_PAD     = CTRL_H * 0.30;
  STICK_BASE_R = CTRL_H * 0.26;
  KNOB_R       = CTRL_H * 0.11;
  FIRE_R       = CTRL_H * 0.22;
  PAUSE_R      = CTRL_H * 0.09;
  STICK_MAX_R  = CTRL_H * 0.21;
}

function resize() {
  VW     = window.innerWidth;
  VH     = window.innerHeight;
  TILE   = Math.floor((VH - HUD_H - CTRL_H) / ROWS);
  BASE_H = ROWS * TILE;
  BASE_W = COLS * TILE;
  buildTileConstants();
  buildCtrlConstants();
  canvas.width  = VW;
  canvas.height = VH;
}

function rescaleWorldOnResize(oldTile) {
  if (!game.player || !oldTile || oldTile === TILE) return;
  const scale   = TILE / oldTile;
  const rescale = e => { e.x *= scale; e.y *= scale; };

  rescale(game.player);
  if (game.enemies)   game.enemies.forEach(rescale);
  if (game.particles) game.particles.forEach(rescale);
  if (game.bullets)   game.bullets.forEach(b => {
    b.x *= scale; b.y *= scale; b.vx *= scale; b.vy *= scale;
  });

  const p = game.player;
  p.speed       = TILE * 3.3;
  p.radius      = TILE * 0.33;
  p.weaponRange = WEAPONS[p.weapon].range + RANGE_BONUS;

  for (const e of (game.enemies || [])) {
    const arch = e.archetype;
    e.radius      = arch === 'tank' ? TILE * 0.46 : arch === 'elite' ? TILE * 0.29 : TILE * 0.33;
    e.speed       = arch === 'elite' ? TILE * 2.2 : TILE * 1.8;
    e.weaponRange = WEAPONS[e.weapon].range;
    e.visionRange = TILE * 5.8 + (game.level || 1) * TILE * 0.33;
    if (e.patrol)              e.patrol.forEach(rescale);
    if (e.pathGoal)            rescale(e.pathGoal);
    if (e.vantageX != null)    { e.vantageX *= scale; e.vantageY *= scale; }
    if (e.spawnX   != null)    { e.spawnX   *= scale; e.spawnY   *= scale; }
  }
}

let _resizeTimer = null;
window.addEventListener('resize', () => {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(() => {
    const oldTile = TILE;
    resize();
    rescaleWorldOnResize(oldTile);
  }, 120);
});


// ┌─────────────────────────────────────────────────────────────────┐
// │  SECTION 4 — AUDIO                                              │
// └─────────────────────────────────────────────────────────────────┘
let audioCtx = null;

function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function resumeAudio() {
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone({ freq=440, freq2=null, type='square', gain=0.15, attack=0.001, decay=0.08, duration=0.1, detune=0, filterFreq=null } = {}) {
  try {
    const ac  = getAudio();
    const osc = ac.createOscillator();
    const env = ac.createGain();
    const t   = ac.currentTime;
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    if (freq2)  osc.frequency.exponentialRampToValueAtTime(freq2, t + duration);
    if (detune) osc.detune.setValueAtTime(detune, t);
    if (filterFreq) {
      const filt = ac.createBiquadFilter();
      filt.type = 'lowpass';
      filt.frequency.setValueAtTime(filterFreq, t);
      osc.connect(filt); filt.connect(env);
    } else {
      osc.connect(env);
    }
    env.gain.setValueAtTime(0, t);
    env.gain.linearRampToValueAtTime(gain, t + attack);
    env.gain.exponentialRampToValueAtTime(0.001, t + attack + decay);
    env.connect(ac.destination);
    osc.start(t); osc.stop(t + duration + 0.05);
  } catch(e) {}
}

function playNoise({ gain=0.2, attack=0.001, decay=0.05, filterFreq=800 } = {}) {
  try {
    const ac   = getAudio();
    const buf  = ac.createBuffer(1, ac.sampleRate * 0.2, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
    const src  = ac.createBufferSource();
    const filt = ac.createBiquadFilter();
    const env  = ac.createGain();
    const t    = ac.currentTime;
    src.buffer = buf;
    filt.type  = 'bandpass';
    filt.frequency.setValueAtTime(filterFreq, t);
    filt.Q.setValueAtTime(0.8, t);
    env.gain.setValueAtTime(0, t);
    env.gain.linearRampToValueAtTime(gain, t + attack);
    env.gain.exponentialRampToValueAtTime(0.001, t + attack + decay);
    src.connect(filt); filt.connect(env); env.connect(ac.destination);
    src.start(t); src.stop(t + decay + 0.05);
  } catch(e) {}
}

const sfx = {
  shoot()     { playTone({ freq:820, freq2:380, type:'square',   gain:0.12, decay:0.07, duration:0.08, filterFreq:1800 }); },
  enemyShoot(){ playTone({ freq:520, freq2:220, type:'sawtooth', gain:0.07, decay:0.06, duration:0.07, filterFreq:900  }); },
  hit()       { playNoise({ gain:0.25, decay:0.06, filterFreq:600 }); },
  kill() {
    playTone({ freq:180, freq2:80, type:'square', gain:0.18, decay:0.14, duration:0.15 });
    setTimeout(() => playTone({ freq:260, type:'square', gain:0.1, decay:0.08, duration:0.08 }), 60);
  },
  playerHit() {
    playNoise({ gain:0.4, decay:0.12, filterFreq:300 });
    playTone({ freq:90, freq2:60, type:'sawtooth', gain:0.2, decay:0.2, duration:0.25 });
  },
  die()     { playTone({ freq:220, freq2:55, type:'sawtooth', gain:0.3, decay:0.6, duration:0.7 }); },
  levelUp() { [0,100,200].forEach((ms,i) => setTimeout(() =>
    playTone({ freq:[440,550,660][i], type:'square', gain:0.12, decay:0.18, duration:0.2 }), ms)); },
  noTarget(){ playTone({ freq:180, type:'square', gain:0.08, decay:0.04, duration:0.04 }); },
};


// ┌─────────────────────────────────────────────────────────────────┐
// │  SECTION 5 — INPUT                                              │
// └─────────────────────────────────────────────────────────────────┘
const leftStick  = { active: false, id: null, baseX: 0, baseY: 0, dx: 0, dy: 0 };
const rightStick = { active: false, id: null };
const keys       = {};
let   gamePaused = false;

function isLeftSide(x)     { return x < VW / 2; }
function inFireZone(x, y)  { const fp = getFirePos();  return Math.hypot(x - fp.x, y - fp.y) < FIRE_R  + CTRL_H * 0.12; }
function inPauseZone(x, y) { const pp = getPausePos(); return Math.hypot(x - pp.x, y - pp.y) < PAUSE_R + CTRL_H * 0.08; }

function togglePause() {
  if (game.state === 'gameover' || game.state === 'transition') return;
  gamePaused = !gamePaused;
  game.state = gamePaused ? 'paused' : 'playing';
}

function onTouchStart(e) {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (inPauseZone(t.clientX, t.clientY)) {
      togglePause();
    } else if (inFireZone(t.clientX, t.clientY) && !rightStick.active) {
      rightStick.active = true; rightStick.id = t.identifier;
    } else if (isLeftSide(t.clientX) && !leftStick.active && t.identifier !== rightStick.id) {
      leftStick.active = true; leftStick.id = t.identifier;
      leftStick.baseX  = t.clientX; leftStick.baseY = t.clientY;
      leftStick.dx     = 0;         leftStick.dy    = 0;
    } else if (!isLeftSide(t.clientX) && !rightStick.active && t.identifier !== leftStick.id) {
      rightStick.active = true; rightStick.id = t.identifier;
    }
  }
}

function onTouchMove(e) {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === rightStick.id) continue;
    if (t.identifier !== leftStick.id)  continue;
    let dx = t.clientX - leftStick.baseX;
    let dy = t.clientY - leftStick.baseY;
    const len = Math.sqrt(dx * dx + dy * dy);
    if (len > STICK_MAX_R) {
      leftStick.baseX += (dx / len) * (len - STICK_MAX_R);
      leftStick.baseY += (dy / len) * (len - STICK_MAX_R);
      dx = t.clientX - leftStick.baseX;
      dy = t.clientY - leftStick.baseY;
    }
    leftStick.dx = Math.max(-1, Math.min(1, dx / STICK_MAX_R));
    leftStick.dy = Math.max(-1, Math.min(1, dy / STICK_MAX_R));
  }
}

function onTouchEnd(e) {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === leftStick.id)  { leftStick.active  = false; leftStick.id  = null; leftStick.dx = 0; leftStick.dy = 0; }
    if (t.identifier === rightStick.id) { rightStick.active = false; rightStick.id = null; }
  }
}

window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  if (e.code === 'Escape' || e.code === 'KeyP') togglePause();
});
window.addEventListener('keyup',     e => { keys[e.code] = false; });
window.addEventListener('mousedown', e => { if (e.button === 0) { rightStick.active = true;  resumeAudio(); } });

// ┌─────────────────────────────────────────────────────────────────┐
// │  SECTION 6 — MAP GENERATION                                     │
// │                                                                 │
// │  Fixed 32×20 tile grid, regenerated each level.                │
// │  0 = open floor,  1 = wall.                                    │
// │                                                                 │
// │  Steps:                                                         │
// │  1. Fill with walls.                                            │
// │  2. Solid 1-tile border.                                        │
// │  3. Place up to MAX_ROOMS rooms (MIN_ROOM–MAX_ROOM tiles).      │
// │  4. Connect rooms with 2-wide L-corridors (guarantees access).  │
// │  5. Add EXTRA_CORRIDORS random corridors for loops.             │
// │  6. Clear spawn zones, connect to nearest room, register them.  │
// └─────────────────────────────────────────────────────────────────┘

function generateMap() {
  const map = Array.from({ length: ROWS }, () => Array(COLS).fill(1));

  for (let r = 0; r < ROWS; r++) { map[r][0] = 1; map[r][COLS - 1] = 1; }
  for (let c = 0; c < COLS; c++) { map[0][c] = 1; map[ROWS - 1][c] = 1; }

  function carveRect(x, y, w, h) {
    for (let r = Math.max(1, y); r < Math.min(ROWS - 1, y + h); r++)
      for (let c = Math.max(1, x); c < Math.min(COLS - 1, x + w); c++)
        map[r][c] = 0;
  }

  function carveCorridor(x1, y1, x2, y2, width) {
    const half = Math.floor(width / 2);
    let x = x1, y = y1;
    while (x !== x2) {
      for (let off = -half; off < width - half; off++)
        map[Math.max(1, Math.min(ROWS-2, y+off))][Math.max(1, Math.min(COLS-2, x))] = 0;
      x += x < x2 ? 1 : -1;
    }
    while (y !== y2) {
      for (let off = -half; off < width - half; off++)
        map[Math.max(1, Math.min(ROWS-2, y))][Math.max(1, Math.min(COLS-2, x+off))] = 0;
      y += y < y2 ? 1 : -1;
    }
  }

  // Place rooms
  const rooms = [];
  for (let attempt = 0; attempt < 60; attempt++) {
    const w = MIN_ROOM + Math.floor(Math.random() * (MAX_ROOM - MIN_ROOM + 1));
    const h = MIN_ROOM + Math.floor(Math.random() * (MAX_ROOM - MIN_ROOM + 1));
    const x = 1 + Math.floor(Math.random() * (COLS - w - 2));
    const y = 1 + Math.floor(Math.random() * (ROWS - h - 2));
    const overlaps = rooms.some(r =>
      x < r.x + r.w + 1 && x + w + 1 > r.x && y < r.y + r.h + 1 && y + h + 1 > r.y);
    if (!overlaps) { rooms.push({ x, y, w, h }); carveRect(x, y, w, h); }
    if (rooms.length >= MAX_ROOMS) break;
  }
  if (rooms.length < 2) {
    const a = { x:1, y:1, w:4, h:4 }, b = { x:COLS-6, y:ROWS-6, w:4, h:4 };
    rooms.push(a, b); carveRect(a.x,a.y,a.w,a.h); carveRect(b.x,b.y,b.w,b.h);
  }

  // Connect rooms
  for (let i = 1; i < rooms.length; i++) {
    const a = rooms[i-1], b = rooms[i];
    carveCorridor(Math.floor(a.x+a.w/2), Math.floor(a.y+a.h/2),
                  Math.floor(b.x+b.w/2), Math.floor(b.y+b.h/2), 2);
  }

  // Extra random corridors for loops
  for (let i = 0; i < EXTRA_CORRIDORS; i++) {
    const a = rooms[Math.floor(Math.random() * rooms.length)];
    const b = rooms[Math.floor(Math.random() * rooms.length)];
    if (a !== b) carveCorridor(Math.floor(a.x+a.w/2), Math.floor(a.y+a.h/2),
                               Math.floor(b.x+b.w/2), Math.floor(b.y+b.h/2), 2);
  }

  // Spawn zones
  for (const sp of [PLAYER_SPAWN, ...ENEMY_SPAWNS]) {
    const r0 = sp.row, c0 = sp.col;
    for (let dr = -SPAWN_CLEAR_RADIUS; dr <= SPAWN_CLEAR_RADIUS; dr++)
      for (let dc = -SPAWN_CLEAR_RADIUS; dc <= SPAWN_CLEAR_RADIUS; dc++) {
        const r = r0+dr, c = c0+dc;
        if (r >= 1 && r < ROWS-1 && c >= 1 && c < COLS-1) map[r][c] = 0;
      }
    let nearest = rooms[0], nearestDist = Infinity;
    for (const rm of rooms) {
      const d = Math.hypot(Math.floor(rm.x+rm.w/2)-c0, Math.floor(rm.y+rm.h/2)-r0);
      if (d < nearestDist) { nearestDist = d; nearest = rm; }
    }
    carveCorridor(c0, r0, Math.floor(nearest.x+nearest.w/2), Math.floor(nearest.y+nearest.h/2), 2);
    rooms.push({ x:c0-SPAWN_CLEAR_RADIUS, y:r0-SPAWN_CLEAR_RADIUS,
                 w:SPAWN_CLEAR_RADIUS*2+1, h:SPAWN_CLEAR_RADIUS*2+1, isSpawn:true });
  }

  return { map, rooms };
}

// ── Map queries ───────────────────────────────────────────────────
function isWall(x, y) {
  const c = Math.floor(x / TILE), r = Math.floor(y / TILE);
  if (c < 0 || c >= COLS || r < 0 || r >= ROWS) return true;
  return game.map[r][c] !== 0;
}

function lineOfWall(x1, y1, x2, y2) {
  const steps = Math.ceil(Math.sqrt((x2-x1)**2 + (y2-y1)**2) / 6);
  for (let i = 1; i < steps; i++) {
    const t = i / steps;
    if (isWall(x1+(x2-x1)*t, y1+(y2-y1)*t)) return true;
  }
  return false;
}

// ── Spatial hash ──────────────────────────────────────────────────
let spatialGrid = {};

function spatialKey(x, y) { return Math.floor(x/SPATIAL_CELL) + ',' + Math.floor(y/SPATIAL_CELL); }

function rebuildSpatialGrid() {
  spatialGrid = {};
  for (const e of game.enemies) {
    const key = spatialKey(e.x, e.y);
    if (!spatialGrid[key]) spatialGrid[key] = [];
    spatialGrid[key].push(e);
  }
}

function nearbyEnemies(cx, cy, r) {
  const minC = Math.floor((cx-r)/SPATIAL_CELL), maxC = Math.floor((cx+r)/SPATIAL_CELL);
  const minR = Math.floor((cy-r)/SPATIAL_CELL), maxR = Math.floor((cy+r)/SPATIAL_CELL);
  const r2 = r * r, result = [];
  for (let gc = minC; gc <= maxC; gc++)
    for (let gr = minR; gr <= maxR; gr++) {
      const cell = spatialGrid[gc+','+gr];
      if (!cell) continue;
      for (const e of cell) {
        const dx = e.x-cx, dy = e.y-cy;
        if (dx*dx+dy*dy <= r2) result.push(e);
      }
    }
  return result;
}


// ┌─────────────────────────────────────────────────────────────────┐
// │  SECTION 7 — PATHFINDING                                        │
// └─────────────────────────────────────────────────────────────────┘

function aStar(sr, sc, er, ec) {
  if (sr === er && sc === ec) return [];
  if (game.map[er]?.[ec] !== 0) return [];

  const key    = (r, c) => r + '|' + c;
  const open   = new Map();
  const closed = new Set();
  open.set(key(sr,sc), { r:sr, c:sc, g:0, f:Math.abs(er-sr)+Math.abs(ec-sc), parent:null });

  while (open.size > 0) {
    let cur = null;
    for (const node of open.values()) if (!cur || node.f < cur.f) cur = node;
    if (cur.r === er && cur.c === ec) {
      const path = [];
      for (let n = cur; n; n = n.parent) path.push({ r:n.r, c:n.c });
      return path.reverse();
    }
    open.delete(key(cur.r, cur.c));
    closed.add(key(cur.r, cur.c));
    for (const [dr, dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
      const nr = cur.r+dr, nc = cur.c+dc;
      if (nr<0||nr>=ROWS||nc<0||nc>=COLS) continue;
      if (game.map[nr][nc] !== 0) continue;
      if (closed.has(key(nr,nc))) continue;
      const g = cur.g+1, f = g+Math.abs(er-nr)+Math.abs(ec-nc);
      const existing = open.get(key(nr,nc));
      if (!existing || g < existing.g) open.set(key(nr,nc), { r:nr, c:nc, g, f, parent:cur });
    }
  }
  return [];
}

function tileCenter(r, c) { return { x: c*TILE + TILE/2, y: r*TILE + TILE/2 }; }

function requestPath(e, tx, ty) {
  const sc = Math.floor(e.x/TILE), sr = Math.floor(e.y/TILE);
  const ec = Math.floor(tx/TILE), er = Math.floor(ty/TILE);
  e.path      = aStar(sr, sc, er, ec);
  e.pathTimer = 0;
  e.pathGoal  = { x:tx, y:ty };
  if (e.path.length > 0 && e.path[0].r === sr && e.path[0].c === sc) e.path.shift();
}

function followPath(e, speed, dt) {
  if (!e.path || e.path.length === 0) return false;
  const dest = tileCenter(e.path[0].r, e.path[0].c);
  const ddx  = dest.x-e.x, ddy = dest.y-e.y, d = Math.hypot(ddx,ddy);
  if (d < 4) { e.path.shift(); return true; }
  const step = Math.min(speed*dt, d);
  e.x += (ddx/d)*step; e.y += (ddy/d)*step;
  return true;
}

function tickPath(e, tx, ty, dt) {
  e.pathTimer = (e.pathTimer||0) + dt;
  const goalMoved = !e.pathGoal || Math.hypot(tx-e.pathGoal.x, ty-e.pathGoal.y) > TILE*1.5;
  if (e.pathTimer >= PATH_INTERVAL || goalMoved || !e.path || e.path.length === 0) requestPath(e, tx, ty);
}

function navigateTo(e, tx, ty, speed, dt)     { tickPath(e, tx, ty, dt); return followPath(e, speed, dt); }

function navigateAwayFrom(e, fx, fy, speed, dt) {
  const ddx = e.x-fx, ddy = e.y-fy, d = Math.hypot(ddx,ddy)||1;
  const dist = (4+Math.random()*2)*TILE;
  const tx = e.x+(ddx/d)*dist, ty = e.y+(ddy/d)*dist;
  const tc = Math.max(0, Math.min(COLS-1, Math.floor(tx/TILE)));
  const tr = Math.max(0, Math.min(ROWS-1, Math.floor(ty/TILE)));
  if (game.map[tr]?.[tc] === 0) {
    navigateTo(e, tc*TILE+TILE/2, tr*TILE+TILE/2, speed, dt);
  } else {
    for (let attempt = 0; attempt < 8; attempt++) {
      const a  = Math.atan2(ddy,ddx) + (Math.random()-0.5)*Math.PI;
      const rd = (3+Math.random()*3)*TILE;
      const rc = Math.floor((e.x+Math.cos(a)*rd)/TILE);
      const rr = Math.floor((e.y+Math.sin(a)*rd)/TILE);
      if (rc>=0&&rc<COLS&&rr>=0&&rr<ROWS&&game.map[rr]?.[rc]===0) {
        navigateTo(e, rc*TILE+TILE/2, rr*TILE+TILE/2, speed, dt); break;
      }
    }
  }
}

function normAngle(a) {
  while (a >  Math.PI) a -= Math.PI*2;
  while (a < -Math.PI) a += Math.PI*2;
  return a;
}


// ┌─────────────────────────────────────────────────────────────────┐
// │  SECTION 8 — ENTITIES                                           │
// └─────────────────────────────────────────────────────────────────┘

function createPlayer(col, row) {
  // Armor: 0=none, 1=blue, 2=white. Blue→rifle, white→rifle+x2 score.
  // Armor and weapon persist between levels; health resets each level.
  return {
    x: col*TILE+TILE/2, y: row*TILE+TILE/2,
    speed: TILE*3.3, radius: TILE*0.33, angle: 0,
    weapon: 'pistol', fireCooldown: 0,
    weaponRange: WEAPONS.pistol.range+RANGE_BONUS,
    invincible: 0, health: 3, armor: 0,
  };
}

function createEnemy(x, y, level, archetype) {
  const baseHp4 = 1 + Math.floor((level-1)/4);
  const baseHp8 = 1 + Math.floor((level-1)/8);
  const base = {
    x, y, angle: 0, archetype,
    patrol: [{x,y}], patrolIdx: 0,
    state: 'patrol', alertTimer: 0, hitFlash: 0,
    visionRange: TILE*5.8 + level*TILE*0.33,
    visionAngle: Math.PI*0.38,
    path: [], pathTimer: 0, pathGoal: null, patrolPath: null,
  };
  switch (archetype) {
    case 'regular': return { ...base,
      radius:TILE*0.33, speed:TILE*1.8, health:baseHp4, points:ENEMY_POINTS.regular,
      weapon:'pistol', weaponRange:WEAPONS.pistol.range,
      shootRate:WEAPONS.pistol.fireRate, shootCooldown:Math.random()*1.5 };
    case 'elite': return { ...base,
      radius:TILE*0.29, speed:TILE*2.2, health:baseHp4, points:ENEMY_POINTS.elite,
      weapon:'pistol', weaponRange:WEAPONS.pistol.range,
      shootRate:WEAPONS.pistol.fireRate, shootCooldown:Math.random()*1.0, flankAngle:null };
    case 'tank': return { ...base,
      radius:TILE*0.46, speed:TILE*1.8, health:baseHp8*3, points:ENEMY_POINTS.tank,
      weapon:'shotgun', weaponRange:WEAPONS.shotgun.range,
      shootRate:WEAPONS.shotgun.fireRate, shootCooldown:Math.random()*1.2 };
    default: return { ...base,
      radius:TILE*0.33, speed:TILE*1.8, health:baseHp4, points:ENEMY_POINTS.regular,
      weapon:'pistol', weaponRange:WEAPONS.pistol.range,
      shootRate:WEAPONS.pistol.fireRate, shootCooldown:Math.random()*1.5 };
  }
}

function mkBullet(x, y, angle, fromEnemy, weapon, shooterRange) {
  const wep = WEAPONS[weapon];
  return {
    x, y,
    vx: Math.cos(angle)*wep.bulletSpeed,
    vy: Math.sin(angle)*wep.bulletSpeed,
    fromEnemy,
    radius: TILE*0.125,
    distLeft: shooterRange + TILE,
  };
}

function damageEnemy(e, dmg, nx, ny) {
  e.health -= dmg; e.hitFlash = 1; e.state = 'chase'; e.alertTimer = 3;
  if (nx !== undefined && ny !== undefined) {
    const KNOCKBACK = TILE*0.25;
    const kx = e.x+nx*KNOCKBACK, ky = e.y+ny*KNOCKBACK, r = e.radius*0.85;
    if (!isWall(kx,ky)&&!isWall(kx+r,ky)&&!isWall(kx-r,ky)&&!isWall(kx,ky+r)&&!isWall(kx,ky-r))
      { e.x=kx; e.y=ky; }
  }
  sfx.hit();
  spawnParticles(e.x, e.y, '#ff3010', 5);
  if (e.health <= 0) killEnemy(e);
}

function killEnemy(e) {
  const idx = game.enemies.indexOf(e);
  if (idx === -1) return;
  game.enemies.splice(idx, 1);
  game.kills++;
  if (game.killsByType[e.archetype] !== undefined) game.killsByType[e.archetype]++;
  markHUDDirty();
  sfx.kill();
  const mult = game.player.armor >= 2 ? 2 : 1;
  if (mult > 1) game.whiteBonus += e.points;
  game.score += e.points * mult;
  spawnParticles(e.x, e.y, '#ff1800', 14);
}

function hitPlayer() {
  const p = game.player;
  p.invincible = 1.5;
  sfx.playerHit();
  // Armor absorbs hit: white→blue→none→lose heart
  if (p.armor >= 2) {
    p.armor = 1;
    spawnParticles(p.x, p.y, '#ffffff', 12);
  } else if (p.armor === 1) {
    p.armor = 0; p.weapon = 'pistol';
    p.weaponRange = WEAPONS.pistol.range + RANGE_BONUS;
    spawnParticles(p.x, p.y, '#00cfff', 10);
  } else {
    p.health--;
    spawnParticles(p.x, p.y, '#ff0040', 8);
    if (p.health <= 0) { sfx.die(); gameOver(); return; }
  }
  markHUDDirty();
}


// ┌─────────────────────────────────────────────────────────────────┐
// │  SECTION 9 — AI BEHAVIORS                                       │
// └─────────────────────────────────────────────────────────────────┘

function behaviorTank(e, p, dist, toPlayer, dt) {
  if (dist > e.weaponRange) navigateTo(e, p.x, p.y, e.speed, dt);
  e.angle = toPlayer;
  if (dist <= e.weaponRange && e.shootCooldown <= 0 && !lineOfWall(e.x,e.y,p.x,p.y)) {
    e.shootCooldown = e.shootRate;
    const wep = WEAPONS.shotgun;
    for (let i = 0; i < wep.pellets; i++) {
      const offset = (i/(wep.pellets-1)-0.5)*wep.spread*2;
      game.bullets.push(mkBullet(e.x,e.y, toPlayer+offset, true,'shotgun',e.weaponRange));
    }
    sfx.enemyShoot();
    spawnParticles(e.x+Math.cos(toPlayer)*14, e.y+Math.sin(toPlayer)*14, '#ff8800', 5);
  }
}

function behaviorElite(e, p, dist, toPlayer, dt) {
  const inAttackRange = dist <= e.weaponRange;
  const tooClose      = dist <  e.weaponRange*0.55;
  const role          = e.role || 'direct';
  let targetX = p.x, targetY = p.y;
  if (role === 'flank') {
    const flankDist = e.weaponRange*0.85;
    targetX = p.x+Math.cos(e.flankAngle)*flankDist;
    targetY = p.y+Math.sin(e.flankAngle)*flankDist;
  }
  if      (tooClose)                                      navigateAwayFrom(e,p.x,p.y,e.speed*0.7,dt);
  else if (Math.hypot(targetX-e.x,targetY-e.y) > 10)     navigateTo(e,targetX,targetY,e.speed,dt);
  e.angle = toPlayer;
  if (inAttackRange && e.shootCooldown <= 0 && !lineOfWall(e.x,e.y,p.x,p.y)) {
    e.shootCooldown = e.shootRate;
    const wep = WEAPONS[e.weapon||'pistol'];
    game.bullets.push(mkBullet(e.x,e.y, toPlayer+(Math.random()-0.5)*wep.spread, true,e.weapon||'pistol',e.weaponRange));
    sfx.enemyShoot();
  }
}

function behaviorRegular(e, p, dist, toPlayer, hasTank, dt) {
  const inAttackRange = dist <= e.weaponRange;
  const tooClose      = dist <  e.weaponRange*0.55;
  const role          = e.role || 'direct';
  const wep           = WEAPONS[e.weapon||'pistol'];

  if (role === 'suppress' && hasTank) {
    const suppressRange = e.weaponRange*0.9;
    if      (dist > suppressRange*1.1) navigateTo(e,p.x,p.y,e.speed*0.6,dt);
    else if (dist < suppressRange*0.7) navigateAwayFrom(e,p.x,p.y,e.speed*0.5,dt);
    e.angle = toPlayer;
    if (e.shootCooldown <= 0 && !lineOfWall(e.x,e.y,p.x,p.y)) {
      e.shootCooldown = e.shootRate;
      game.bullets.push(mkBullet(e.x,e.y, toPlayer+(Math.random()-0.5)*wep.spread, true,e.weapon||'pistol',e.weaponRange));
      sfx.enemyShoot();
    }
  } else {
    if      (tooClose)       navigateAwayFrom(e,p.x,p.y,e.speed*0.7,dt);
    else if (!inAttackRange) navigateTo(e,p.x,p.y,e.speed,dt);
    e.angle = toPlayer;
    if (inAttackRange && e.shootCooldown <= 0 && !lineOfWall(e.x,e.y,p.x,p.y)) {
      e.shootCooldown = e.shootRate;
      game.bullets.push(mkBullet(e.x,e.y, toPlayer+(Math.random()-0.5)*wep.spread, true,e.weapon||'pistol',e.weaponRange));
      sfx.enemyShoot();
    }
  }
}


// ┌─────────────────────────────────────────────────────────────────┐
// │  SECTION 10 — PARTICLES                                         │
// └─────────────────────────────────────────────────────────────────┘

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const a = Math.random()*Math.PI*2, s = 30+Math.random()*80;
    game.particles.push({
      x, y, color,
      vx: Math.cos(a)*s, vy: Math.sin(a)*s,
      life: 0.3+Math.random()*0.4, maxLife: 0.3+Math.random()*0.4,
      size: TILE*0.06+Math.random()*TILE*0.1,
    });
  }
}

function spawnMuzzle(x, y) {
  game.particles.push({ x, y, color:'#ffffa0', vx:0, vy:0, life:0.07, maxLife:0.07, size:TILE*0.25, muzzle:true });
}

function updateParticles(dt) {
  for (let i = game.particles.length-1; i >= 0; i--) {
    const p = game.particles[i];
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.vx*=0.88; p.vy*=0.88; p.life-=dt;
    if (p.life <= 0) game.particles.splice(i, 1);
  }
}


// ┌─────────────────────────────────────────────────────────────────┐
// │  SECTION 11 — UPDATE (simulation tick)                          │
// └─────────────────────────────────────────────────────────────────┘

function update(dt) {
  if (game.state !== 'playing' || gamePaused) return;
  rebuildSpatialGrid();
  game.maxEnemyRadius = game.enemies.reduce((m, e) => Math.max(m, e.radius), 12);
  updatePlayer(dt);
  updateEnemies(dt);
  updateBullets(dt);
  updateParticles(dt);
  checkWin();
  updateHUD();
}

function moveWithCollision(entity, dx, dy) {
  const r = entity.radius*0.85;
  const nx = entity.x+dx, ny = entity.y+dy;
  if (!isWall(nx,ny)&&!isWall(nx+r,ny)&&!isWall(nx-r,ny)
   &&!isWall(nx,ny+r)&&!isWall(nx,ny-r)
   &&!isWall(nx+r,ny+r)&&!isWall(nx-r,ny+r)
   &&!isWall(nx+r,ny-r)&&!isWall(nx-r,ny-r)) { entity.x=nx; entity.y=ny; return; }
  const ox=entity.x+dx, oy=entity.y;
  if (!isWall(ox,oy)&&!isWall(ox+r,oy)&&!isWall(ox-r,oy)
   &&!isWall(ox,oy+r)&&!isWall(ox,oy-r)
   &&!isWall(ox+r,oy+r)&&!isWall(ox-r,oy+r)
   &&!isWall(ox+r,oy-r)&&!isWall(ox-r,oy-r)) { entity.x=ox; return; }
  const px=entity.x, py=entity.y+dy;
  if (!isWall(px,py)&&!isWall(px+r,py)&&!isWall(px-r,py)
   &&!isWall(px,py+r)&&!isWall(px,py-r)
   &&!isWall(px+r,py+r)&&!isWall(px-r,py+r)
   &&!isWall(px+r,py-r)&&!isWall(px-r,py-r)) entity.y=py;
}

function updatePlayer(dt) {
  const p = game.player;
  p.fireCooldown = Math.max(0, p.fireCooldown-dt);
  p.invincible   = Math.max(0, p.invincible-dt);

  let mx = leftStick.dx, my = leftStick.dy;
  if (keys['KeyW']||keys['ArrowUp'])    my -= 1;
  if (keys['KeyS']||keys['ArrowDown'])  my += 1;
  if (keys['KeyA']||keys['ArrowLeft'])  mx -= 1;
  if (keys['KeyD']||keys['ArrowRight']) mx += 1;
  const mlen = Math.sqrt(mx*mx+my*my)||1;
  if (mx!==0||my!==0) moveWithCollision(p, (mx/mlen)*p.speed*dt, (my/mlen)*p.speed*dt);

  // Auto-aim toward nearest visible enemy in range
  let nearest = null, nearestDist = Infinity;
  for (const e of nearbyEnemies(p.x,p.y,p.weaponRange)) {
    const dx=e.x-p.x, dy=e.y-p.y, d=Math.sqrt(dx*dx+dy*dy);
    if (d < nearestDist && !lineOfWall(p.x,p.y,e.x,e.y)) { nearest=e; nearestDist=d; }
  }
  if (nearest)           p.angle = Math.atan2(nearest.y-p.y, nearest.x-p.x);
  else if (mx!==0||my!==0) p.angle = Math.atan2(my/mlen, mx/mlen);

  const firing = rightStick.active || keys['Space'];
  if (firing && p.fireCooldown <= 0) {
    p.fireCooldown = WEAPONS[p.weapon].fireRate;
    if (nearest) {
      const wep = WEAPONS[p.weapon];
      const baseAngle = Math.atan2(nearest.y-p.y, nearest.x-p.x);
      for (let i = 0; i < wep.pellets; i++) {
        const spread = wep.pellets > 1
          ? (i/(wep.pellets-1)-0.5)*wep.spread*2
          : (Math.random()-0.5)*wep.spread;
        game.bullets.push(mkBullet(p.x,p.y, baseAngle+spread, false,p.weapon,p.weaponRange));
      }
      sfx.shoot();
      spawnMuzzle(p.x+Math.cos(p.angle)*TILE*0.5, p.y+Math.sin(p.angle)*TILE*0.5);
    } else {
      sfx.noTarget();
    }
  }
}

function updateEnemies(dt) {
  const p = game.player;
  const chasers       = game.enemies.filter(e => e.state === 'chase');
  const hasTank       = chasers.some(e => e.archetype === 'tank');
  const playerEngaged = chasers.some(e => Math.hypot(p.x-e.x,p.y-e.y) <= e.weaponRange);
  const flankAngles   = [Math.PI*0.5, -Math.PI*0.5, Math.PI*0.75, -Math.PI*0.75];
  let   flankSlot     = 0;

  // Assign tactical roles for this frame
  for (const e of chasers) {
    if (e.archetype === 'elite') {
      e.role = (playerEngaged && chasers.length > 1) ? 'flank' : 'direct';
      if (e.role === 'flank') { e.flankAngle = flankAngles[flankSlot%flankAngles.length]; flankSlot++; }
    } else if (e.archetype === 'regular') {
      e.role = hasTank ? 'suppress' : 'direct';
    }
  }

  for (const e of game.enemies) {
    e.hitFlash      = Math.max(0, e.hitFlash-dt*8);
    e.shootCooldown = Math.max(0, e.shootCooldown-dt);

    const dx=p.x-e.x, dy=p.y-e.y;
    const dist=Math.hypot(dx,dy), toPlayer=Math.atan2(dy,dx);
    const angDiff = Math.abs(normAngle(toPlayer-e.angle));
    const canSee  = dist < e.visionRange && angDiff < e.visionAngle && !lineOfWall(e.x,e.y,p.x,p.y);

    // Patrol → Chase transition with staggered alert propagation
    if (canSee) {
      if (e.state !== 'chase') {
        const alertRadius = TILE*8;
        for (const other of nearbyEnemies(e.x,e.y,alertRadius)) {
          if (other===e||other.state==='chase') continue;
          const delay = 0.3+(Math.hypot(other.x-e.x,other.y-e.y)/alertRadius)*1.2;
          if (other.alertDelay===undefined||delay<other.alertDelay) other.alertDelay=delay;
        }
      }
      e.state='chase'; e.alertTimer=2.5;
    } else if (e.alertTimer > 0) {
      e.alertTimer -= dt;
      if (e.alertTimer <= 0) { e.state='patrol'; e.path=[]; e.pathTimer=0; e.pathGoal=null; e.patrolPath=null; }
    }

    if (e.alertDelay !== undefined) {
      e.alertDelay -= dt;
      if (e.alertDelay <= 0) {
        e.alertDelay = undefined;
        if (e.state!=='chase') { e.state='chase'; e.alertTimer=3; }
      }
    }

    if (e.state === 'patrol') {
      // Follow A* patrol route
      const wp = e.patrol[e.patrolIdx];
      if (!e.patrolPath||e.patrolPath.length===0) {
        const sc=Math.floor(e.x/TILE), sr=Math.floor(e.y/TILE);
        const ec=Math.floor(wp.x/TILE), er=Math.floor(wp.y/TILE);
        e.patrolPath = aStar(sr,sc,er,ec);
        if (e.patrolPath.length>0&&e.patrolPath[0].r===sr&&e.patrolPath[0].c===sc) e.patrolPath.shift();
      }
      if (e.patrolPath&&e.patrolPath.length>0) {
        const node=e.patrolPath[0], dest=tileCenter(node.r,node.c);
        const pdx=dest.x-e.x, pdy=dest.y-e.y, pd=Math.hypot(pdx,pdy);
        if (pd<3) { e.patrolPath.shift(); }
        else {
          const step=e.speed*0.5*dt;
          e.x+=(pdx/pd)*Math.min(step,pd); e.y+=(pdy/pd)*Math.min(step,pd);
          e.angle=Math.atan2(pdy,pdx);
        }
      } else { e.patrolIdx=(e.patrolIdx+1)%e.patrol.length; e.patrolPath=null; }
    } else {
      if      (e.archetype==='tank')  behaviorTank(e,p,dist,toPlayer,dt);
      else if (e.archetype==='elite') behaviorElite(e,p,dist,toPlayer,dt);
      else                            behaviorRegular(e,p,dist,toPlayer,hasTank,dt);
    }

    if (dist < e.radius+p.radius+2 && p.invincible <= 0) hitPlayer();
  }
}

function updateBullets(dt) {
  const p = game.player;
  for (let i = game.bullets.length-1; i >= 0; i--) {
    const b = game.bullets[i];
    const step = Math.hypot(b.vx,b.vy)*dt;
    b.x+=b.vx*dt; b.y+=b.vy*dt; b.distLeft-=step;

    if (b.distLeft<=0||isWall(b.x,b.y)) {
      spawnParticles(b.x,b.y, b.fromEnemy?'#ff5030':'#ffe060', 2);
      game.bullets.splice(i,1); continue;
    }

    if (b.fromEnemy) {
      const dx=p.x-b.x, dy=p.y-b.y;
      if (Math.sqrt(dx*dx+dy*dy) < p.radius && p.invincible<=0) { game.bullets.splice(i,1); hitPlayer(); }
    } else {
      const maxR = game.maxEnemyRadius+6;
      for (const e of nearbyEnemies(b.x,b.y,maxR)) {
        const dx=e.x-b.x, dy=e.y-b.y;
        if (Math.sqrt(dx*dx+dy*dy) < e.radius) {
          const bspd=Math.hypot(b.vx,b.vy)||1;
          game.bullets.splice(i,1); damageEnemy(e,1,b.vx/bspd,b.vy/bspd); break;
        }
      }
    }
  }
}

// │  SECTION 12 — GAME LOOP                                         │

let game  = {};
let animId;

function startGame() {
  overlay.style.display = 'none';
  resumeAudio();
  game.score       = 0;
  game.kills       = 0;
  game.bonusScore  = 0;
  game.whiteBonus  = 0;
  game.killsByType = { regular:0, elite:0, tank:0 };
  game.player      = null;
  game.snapshot    = null;
  initLevel(1);
  if (animId) cancelAnimationFrame(animId);
  let last = performance.now();
  function loop(now) {
    const dt = Math.min((now-last)/1000, 0.05);
    last = now;
    update(dt); draw();
    animId = requestAnimationFrame(loop);
  }
  animId = requestAnimationFrame(loop);
}

function initLevel(level) {
  resize();
  const { map, rooms } = generateMap();
  game.map      = map;
  game.rooms    = rooms;
  game.level    = level;
  game.bullets  = [];
  game.particles = [];
  game.state    = 'playing';

  // Health resets each level; armor and weapon persist as clean-clear rewards.
  if (!game.player || level === 1) {
    game.player = createPlayer(PLAYER_SPAWN.col, PLAYER_SPAWN.row);
  } else {
    game.player.x          = PLAYER_SPAWN.col*TILE + TILE/2;
    game.player.y          = PLAYER_SPAWN.row*TILE + TILE/2;
    game.player.health     = 3;
    game.player.invincible = 1.5;
  }

  game.enemies = [];
  const clampedLevel = Math.min(level, 10);
  const [nRegulars, nElites, nTanks] = SQUAD_TABLE[clampedLevel];
  const shuffle = arr => {
    for (let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
    return arr;
  };
  const archetypeQueue = shuffle([
    ...Array(nRegulars).fill('regular'), ...Array(nElites).fill('elite'),
    ...Array(nTanks).fill('tank'),
  ]);
  const shuffledZones = shuffle([...ENEMY_SPAWNS.slice(0, Math.min(ENEMY_SPAWNS.length, archetypeQueue.length))]);
  for (let i = 0; i < archetypeQueue.length; i++) {
    const sp = shuffledZones[i%shuffledZones.length];
    game.enemies.push(createEnemy(sp.col*TILE+TILE/2, sp.row*TILE+TILE/2, level, archetypeQueue[i]));
  }

  assignPatrolRoutes();
  showWaveAnnounce(`LEVEL ${level}`);
  markHUDDirty();
}

function assignPatrolRoutes() {
  if (!game.enemies.length || !game.rooms.length) return;

  function roomCenter(room) {
    const baseC = Math.floor(room.x+room.w/2), baseR = Math.floor(room.y+room.h/2);
    for (let d=0;d<=3;d++)
      for (let dr=-d;dr<=d;dr++)
        for (let dc=-d;dc<=d;dc++) {
          const r=baseR+dr, c=baseC+dc;
          if (r>=0&&r<ROWS&&c>=0&&c<COLS&&game.map[r][c]===0)
            return { x:c*TILE+TILE/2, y:r*TILE+TILE/2 };
        }
    return null;
  }

  const centers = game.rooms.map(roomCenter).filter(Boolean);
  if (centers.length < 2) return;

  game.enemies.forEach((e, i) => {
    const route = [];
    for (let k=i; k<centers.length; k+=game.enemies.length) route.push(centers[k]);
    while (route.length < 2) {
      for (const c of centers) {
        if (!route.some(r=>r.x===c.x&&r.y===c.y)) { route.push(c); break; }
      }
    }
    route.sort((a,b) => Math.hypot(a.x-e.x,a.y-e.y)-Math.hypot(b.x-e.x,b.y-e.y));
    e.patrol=route; e.patrolIdx=0;
  });
}

function checkWin() {
  if (game.enemies.length!==0||game.state!=='playing') return;
  const p    = game.player;
  const mult = p.armor >= 2 ? 2 : 1;

  if (p.health === 3) {
    if (p.armor === 0) {
      p.armor=1; p.weapon='rifle';
      p.weaponRange=WEAPONS.rifle.range+RANGE_BONUS;
    } else if (p.armor === 1) {
      p.armor=2;
    }
    const bonus = 100*mult;
    game.score+=bonus; game.bonusScore+=bonus;
  }

  showWaveAnnounce('SECTOR CLEAR');
  game.state='transition';
  sfx.levelUp();
  setTimeout(() => initLevel(game.level+1), 2000);
}

function gameOver() {
  game.state = 'gameover';
  // Snapshot at death so debrief survives startGame() resetting game.*
  game.snapshot = {
    score:       game.score,
    kills:       game.kills,
    level:       game.level,
    bonusScore:  game.bonusScore,
    whiteBonus:  game.whiteBonus,
    killsByType: Object.assign({}, game.killsByType),
  };
  showHighScoreScreen();
}

function hsLoad() { try { return JSON.parse(localStorage.getItem(HS_KEY))||[]; } catch { return []; } }
function hsSave(t){ try { localStorage.setItem(HS_KEY, JSON.stringify(t)); } catch {} }

function hsQualifies(score) {
  const t = hsLoad();
  return score > 0 && (t.length < HS_MAX || score > t[t.length-1].score);
}

function hsInsert(name, score, level) {
  const t = hsLoad();
  const entry = { name, score, level, ts:Date.now() };
  t.push(entry); t.sort((a,b)=>b.score-a.score);
  if (t.length > HS_MAX) t.length = HS_MAX;
  hsSave(t);
  return t.findIndex(e => e.ts === entry.ts);
}

function hsRenderTable(highlightIdx, currentTs) {
  const t = hsLoad();
  if (!t.length) return `<div style="color:#2a6a9a;font-size:10px;letter-spacing:3px;margin-bottom:20px">NO RECORDS YET</div>`;
  const rows = t.map((e,i) => {
    const cls = i===highlightIdx ? 'hs-new' : (e.ts===currentTs ? 'hs-current' : '');
    return `<tr class="${cls}">
      <td class="rank">${i+1}</td>
      <td class="name">${e.name}</td>
      <td class="num">${String(e.score).padStart(8,'0')}</td>
      <td class="num" style="color:#2a6a9a;padding-left:8px">LV${e.level}</td>
    </tr>`;
  }).join('');
  return `<table class="hs-table">
    <thead><tr><th>#</th><th>NAME</th><th class="num">SCORE</th><th class="num">LVL</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function showWaveAnnounce(txt) {
  waveAnnounce.textContent   = txt;
  waveAnnounce.style.opacity = '1';
  setTimeout(() => { waveAnnounce.style.opacity='0'; }, 1600);
}

function showHighScoreScreen() {
  const snap     = game.snapshot || game;
  const qualifies = hsQualifies(snap.score);
  const initials  = ['A','A','A'];
  const indices   = [0,0,0];
  let   savedTs   = null;

  function tapToContinue() {
    overlay.addEventListener('click',    showDebrief, { once:true });
    overlay.addEventListener('touchend', showDebrief, { once:true });
  }

  function renderLadder(highlightIdx=-1) {
    overlay.innerHTML = `
      <h1>K.I.A.</h1>
      <div class="subtitle">// HIGH SCORES //</div>
      ${hsRenderTable(highlightIdx, savedTs)}
      <div class="tap-continue">TAP TO CONTINUE</div>`;
    overlay.style.display='flex';
    tapToContinue();
  }

  function renderEntry() {
    overlay.innerHTML = `
      <h1>K.I.A.</h1>
      <div class="subtitle">// HIGH SCORES //</div>
      <div class="initials-entry">
        <div class="initials-label">ENTER YOUR INITIALS</div>
        <div class="initials-wheel">
          ${[0,1,2].map(i=>`
            <div class="initial-col">
              <button onclick="event.stopPropagation();hsStep(${i},1)">▲</button>
              <div class="initial-char" id="ic${i}">${initials[i]}</div>
              <button onclick="event.stopPropagation();hsStep(${i},-1)">▼</button>
            </div>`).join('')}
        </div>
        <button class="hs-confirm" onclick="hsConfirmStop(event);hsConfirm()">CONFIRM</button>
      </div>`;
    overlay.style.display='flex';
  }

  window.hsStep = (col, dir) => {
    indices[col]  = (indices[col]+dir+HS_CHARS.length)%HS_CHARS.length;
    initials[col] = HS_CHARS[indices[col]];
    document.getElementById('ic'+col).textContent=initials[col];
  };
  window.hsConfirm = () => {
    const rank = hsInsert(initials.join(''), snap.score, snap.level);
    savedTs    = hsLoad()[rank]?.ts ?? null;
    renderLadder(rank);
  };
  window.hsConfirmStop = e => e.stopPropagation();

  if (qualifies) renderEntry();
  else           renderLadder();
}

function showDebrief() {
  const snap   = game.snapshot || game;
  const kt     = snap.killsByType;
  const labels = { regular:'REGULAR', elite:'ELITE', tank:'TANK' };
  const colors = { regular:'#ff3020', elite:'#ff40cc', tank:'#40ff60' };

  const killRows = ['regular','elite','tank'].map(type => {
    const count = kt[type]||0, score = count*ENEMY_POINTS[type];
    return `<tr>
      <td style="color:${colors[type]};letter-spacing:2px">${labels[type]}</td>
      <td class="num">${count}</td>
      <td class="num dim">× ${ENEMY_POINTS[type]}</td>
      <td class="num">${score>0?score.toLocaleString():'—'}</td>
    </tr>`;
  }).join('');

  const bonusRow = snap.bonusScore > 0 ? `
    <tr class="bonus-row">
      <td style="color:#ffcc00;letter-spacing:2px">CLEAN BONUS</td>
      <td class="num"></td><td class="num dim"></td>
      <td class="num" style="color:#ffcc00">${snap.bonusScore.toLocaleString()}</td>
    </tr>` : '';

  const whiteRow = snap.whiteBonus > 0 ? `
    <tr class="bonus-row">
      <td style="color:#ffffff;letter-spacing:2px">WHITE ×2</td>
      <td class="num"></td><td class="num dim"></td>
      <td class="num" style="color:#ffffff;text-shadow:0 0 8px rgba(255,255,255,0.8)">${snap.whiteBonus.toLocaleString()}</td>
    </tr>` : '';

  overlay.innerHTML = `
    <h1>K.I.A.</h1>
    <div class="subtitle">// MISSION FAILED — DEBRIEF //</div>
    <div class="report">
      <div class="report-header">
        <span>SECTOR <span style="color:#00cfff">${snap.level}</span></span>
        <span>TOTAL KILLS <span style="color:#00cfff">${snap.kills}</span></span>
      </div>
      <table class="kill-table">
        <thead><tr>
          <th>TARGET</th><th class="num">KILLS</th><th class="num"></th><th class="num">PTS</th>
        </tr></thead>
        <tbody>${killRows}${bonusRow}${whiteRow}</tbody>
        <tfoot><tr class="total-row">
          <td colspan="3" style="letter-spacing:3px">TOTAL SCORE</td>
          <td class="num">${String(snap.score).padStart(8,'0')}</td>
        </tr></tfoot>
      </table>
    </div>
    <button id="start-btn">RETRY MISSION</button>`;
  overlay.style.display='flex';
  document.getElementById('start-btn').addEventListener('click', startGame);
}

let _hudDirty = true;
let _hudLast  = {};

function markHUDDirty() { _hudDirty = true; }

function updateHUD() {
  const p = game.player;
  if (!p) return;
  const hp=p.health||0, armor=p.armor||0;
  const kills=game.kills||0, level=game.level||1;
  const foeCount=game.enemies?game.enemies.length:0, score=game.score;

  if (_hudLast.hp===hp&&_hudLast.armor===armor&&_hudLast.kills===kills
   &&_hudLast.level===level&&_hudLast.foeCount===foeCount&&_hudLast.score===score&&!_hudDirty) return;

  _hudLast={hp,armor,kills,level,foeCount,score}; _hudDirty=false;

  let hpClass='', heartStyle='';
  if (armor===2) {
    heartStyle='color:#ffffff;text-shadow:0 0 14px rgba(255,255,255,1),0 0 4px rgba(200,220,255,0.8)';
  } else if (armor===1) {
    heartStyle='color:#00cfff;text-shadow:0 0 10px rgba(0,180,255,0.9)';
  } else {
    hpClass=hp>=3?'hearts-full':hp===2?'hearts-one-down':'hearts-last';
  }
  hudLives.className='hud-value '+hpClass;
  const st=heartStyle?` style="${heartStyle}"`:'';
  hudLives.innerHTML=`<span${st}>${'♥'.repeat(hp)}</span><span style="opacity:0.2">${'♡'.repeat(Math.max(0,3-hp))}</span>`;

  hudKills.textContent=kills; hudKills.className='hud-value';
  hudLevel.textContent=level; hudLevel.className='hud-value';
  hudFoes.textContent=foeCount;
  hudFoes.className='hud-value'+(foeCount===0?'':foeCount<=2?' warning':' danger');
  hudScore.textContent=String(score).padStart(8,'0');
}

// ── Camera ────────────────────────────────────────────────────────
// Horizontal scroll only — map height exactly fills the game viewport.
function getCam(p) {
  const camX = p ? Math.max(0, Math.min(BASE_W-VW, p.x-VW/2)) : 0;
  return { camX, camY:0 };
}

// ── Control panel geometry ────────────────────────────────────────
function getStickPos() { return { x:CTRL_PAD+STICK_BASE_R,   y:VH-CTRL_PAD-STICK_BASE_R }; }
function getFirePos()  { return { x:VW-CTRL_PAD-FIRE_R,      y:VH-CTRL_PAD-FIRE_R       }; }
function getPausePos() { const panelY=HUD_H+BASE_H; return { x:VW/2, y:panelY+(VH-panelY)/2 }; }

// Shared glowing separator line — HUD bottom edge and control panel top edge
function drawGlowLine(x1, y1, x2, y2) {
  const grd = ctx.createLinearGradient(x1,0,x2,0);
  grd.addColorStop(0,   'rgba(0,207,255,0)');
  grd.addColorStop(0.2, 'rgba(0,207,255,0.6)');
  grd.addColorStop(0.5, 'rgba(0,207,255,0.9)');
  grd.addColorStop(0.8, 'rgba(0,207,255,0.6)');
  grd.addColorStop(1,   'rgba(0,207,255,0)');
  ctx.strokeStyle=grd; ctx.lineWidth=1.5;
  ctx.shadowColor='#00cfff'; ctx.shadowBlur=8;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  ctx.shadowBlur=0;
}

function draw() {
  ctx.clearRect(0,0,VW,VH);
  ctx.fillStyle='#060a10'; ctx.fillRect(0,0,VW,VH);

  const p = game.player;
  const { camX, camY } = getCam(p);

  // HUD bezel
  ctx.fillStyle='#060a10'; ctx.fillRect(0,0,VW,HUD_H);
  drawGlowLine(0, HUD_H-1, VW, HUD_H-1);

  // Game viewport — clipped between HUD and control panel
  ctx.save();
  ctx.beginPath(); ctx.rect(0,HUD_H,VW,BASE_H); ctx.clip();
  ctx.save();
  ctx.translate(-camX, HUD_H-camY);
  drawMap(); drawBullets(); drawEnemies(); drawPlayer(); drawParticles();
  ctx.restore();
  ctx.restore();

  drawJoystick();

  if (gamePaused) {
    ctx.save();
    ctx.font=`900 clamp(18px,5vw,26px) 'Orbitron',sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='#ffcc00'; ctx.shadowColor='#ffcc00'; ctx.shadowBlur=24;
    ctx.globalAlpha=0.9+Math.sin(Date.now()*0.004)*0.1;
    ctx.fillText('PAUSED', VW/2, HUD_H+BASE_H/2);
    ctx.restore();
  }
}

function drawMap() {
  const p = game.player;
  const { camX, camY } = getCam(p);
  const minC=Math.max(0,Math.floor(camX/TILE)-1),       maxC=Math.min(COLS-1,Math.ceil((camX+VW)/TILE)+1);
  const minR=Math.max(0,Math.floor(camY/TILE)-1),       maxR=Math.min(ROWS-1,Math.ceil((camY+VH)/TILE)+1);

  for (let r=minR;r<=maxR;r++) {
    for (let c=minC;c<=maxC;c++) {
      const x=c*TILE, y=r*TILE;
      if (game.map[r][c]!==0) {
        ctx.fillStyle='#06090f'; ctx.fillRect(x,y,TILE,TILE);
        ctx.fillStyle='#1e4a70';
        if (r<ROWS-1&&game.map[r+1][c]===0) ctx.fillRect(x,y+TILE-2,TILE,2);
        if (r>0     &&game.map[r-1][c]===0) ctx.fillRect(x,y,TILE,2);
        if (c<COLS-1&&game.map[r][c+1]===0) ctx.fillRect(x+TILE-2,y,2,TILE);
        if (c>0     &&game.map[r][c-1]===0) ctx.fillRect(x,y,2,TILE);
      } else {
        ctx.fillStyle='#0d1825'; ctx.fillRect(x,y,TILE,TILE);
        ctx.strokeStyle='rgba(255,255,255,0.018)'; ctx.strokeRect(x,y,TILE,TILE);
      }
    }
  }

  if (p) {
    const grd=ctx.createRadialGradient(p.x,p.y,TILE*1.25,p.x,p.y,TILE*8.3);
    grd.addColorStop(0,'rgba(0,0,0,0)'); grd.addColorStop(0.5,'rgba(0,0,0,0)'); grd.addColorStop(1,'rgba(0,0,0,0.82)');
    ctx.fillStyle=grd; ctx.fillRect(0,0,BASE_W,BASE_H);
  }
}

function drawBullets() {
  for (const b of game.bullets) {
    ctx.save(); ctx.translate(b.x,b.y); ctx.rotate(Math.atan2(b.vy,b.vx));
    ctx.shadowColor=b.fromEnemy?'#ff4020':'#ffe060'; ctx.shadowBlur=7;
    ctx.fillStyle=b.fromEnemy?'#ff6040':'#ffffa0';
    ctx.fillRect(-6,-1.5,9,3); ctx.restore();
  }
}

function drawEnemies() {
  const p = game.player;
  for (const e of game.enemies) {
    ctx.save(); ctx.translate(e.x,e.y);
    const arc=e.archetype||'regular', fl=e.hitFlash, chasing=e.state==='chase';
    const inRange=Math.hypot(p.x-e.x,p.y-e.y)<=e.weaponRange;
    const pal=ENEMY_PALETTE[arc]||ENEMY_PALETTE.regular;

    // Range aura
    const grd=ctx.createRadialGradient(0,0,e.radius,0,0,e.weaponRange);
    grd.addColorStop(0, inRange?`rgba(${pal.range},0.08)`:`rgba(${pal.range},0.02)`);
    grd.addColorStop(1,`rgba(${pal.range},0)`);
    ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(0,0,e.weaponRange,0,Math.PI*2); ctx.fill();

    // Body
    ctx.rotate(e.angle);
    ctx.shadowColor=fl>0.5?'#fff':pal.glow; ctx.shadowBlur=fl>0?14:(chasing?10:4);
    ctx.fillStyle=fl>0.5?'#ffffff':(chasing?pal.chase:pal.idle);
    ctx.beginPath(); ctx.arc(0,0,e.radius,0,Math.PI*2); ctx.fill();

    if (arc==='tank') {
      ctx.fillStyle=fl>0.5?'rgba(255,255,255,0.3)':'rgba(40,200,80,0.2)';
      ctx.fillRect(-e.radius*0.7,-e.radius*0.7,e.radius*1.4,e.radius*1.4);
    }

    // Gun nub
    ctx.fillStyle=fl>0.5?'#ffcc00':pal.nub;
    const nubLen=arc==='tank'?TILE*0.17:TILE*0.25, nubW=TILE*0.125;
    ctx.beginPath(); ctx.moveTo(e.radius,0); ctx.lineTo(e.radius+nubLen,-nubW); ctx.lineTo(e.radius+nubLen,nubW); ctx.fill();

    // Health pips
    ctx.rotate(-e.angle);
    const pipW=TILE*0.125, pipH=TILE*0.083, pipGap=TILE*0.21;
    for (let h=0;h<e.health;h++) {
      ctx.fillStyle=arc==='tank'?'#40ff60':arc==='elite'?'#ff40cc':'#ff3030';
      ctx.fillRect(-pipGap*0.5+h*pipGap,-e.radius-TILE*0.29,pipW,pipH);
    }
    ctx.restore();
  }
}

function drawPlayer() {
  const p = game.player;
  if (!p) return;
  if (p.invincible>0&&Math.floor(p.invincible*10)%2===0) return;
  ctx.save(); ctx.translate(p.x,p.y);

  const pgrd=ctx.createRadialGradient(0,0,p.radius,0,0,p.weaponRange);
  pgrd.addColorStop(0,'rgba(0,180,255,0.06)'); pgrd.addColorStop(1,'rgba(0,180,255,0)');
  ctx.fillStyle=pgrd; ctx.beginPath(); ctx.arc(0,0,p.weaponRange,0,Math.PI*2); ctx.fill();

  ctx.shadowColor='#00cfff'; ctx.shadowBlur=12; ctx.fillStyle='#003d5c';
  ctx.beginPath(); ctx.arc(0,0,p.radius,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=4; ctx.fillStyle='#00cfff';
  ctx.beginPath(); ctx.arc(0,0,p.radius-3,0,Math.PI*2); ctx.fill();

  ctx.rotate(p.angle); ctx.shadowBlur=0; ctx.fillStyle='#0088bb';
  ctx.fillRect(TILE*0.29,-TILE*0.063,TILE*0.33,TILE*0.125);
  ctx.restore();
}

function drawParticles() {
  for (const p of game.particles) {
    const alpha=p.life/p.maxLife;
    ctx.save(); ctx.globalAlpha=alpha; ctx.fillStyle=p.color;
    if (p.muzzle) { ctx.shadowColor=p.color; ctx.shadowBlur=10; }
    ctx.beginPath(); ctx.arc(p.x,p.y,p.muzzle?p.size:p.size*alpha,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

function drawControlPanel() {
  const panelY=HUD_H+BASE_H, pp=getPausePos();
  ctx.save();

  const panelGrd=ctx.createLinearGradient(0,panelY,0,VH);
  panelGrd.addColorStop(0,'#0a1520'); panelGrd.addColorStop(0.3,'#0d1c2e'); panelGrd.addColorStop(1,'#060e18');
  ctx.fillStyle=panelGrd; ctx.fillRect(0,panelY,VW,VH-panelY);

  drawGlowLine(0,panelY,VW,panelY);

  ctx.globalAlpha=0.04; ctx.strokeStyle='#00cfff'; ctx.lineWidth=1;
  for (let y=panelY+6;y<VH;y+=8) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(VW,y); ctx.stroke(); }
  ctx.globalAlpha=1;

  const rivets=[{x:14,y:panelY+10},{x:VW-14,y:panelY+10},{x:14,y:VH-10},{x:VW-14,y:VH-10}];
  for (const rv of rivets) {
    ctx.globalAlpha=0.5; ctx.fillStyle='#1e4a70'; ctx.beginPath(); ctx.arc(rv.x,rv.y,4,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=0.3; ctx.fillStyle='#00cfff'; ctx.beginPath(); ctx.arc(rv.x-1,rv.y-1,1.5,0,Math.PI*2); ctx.fill();
  }

  ctx.globalAlpha=0.08; ctx.strokeStyle='#00cfff'; ctx.lineWidth=1; ctx.setLineDash([4,8]);
  ctx.beginPath(); ctx.moveTo(VW/2,panelY+12); ctx.lineTo(VW/2,VH-12); ctx.stroke();
  ctx.setLineDash([]);

  ctx.globalAlpha=0.18; ctx.fillStyle='#00cfff';
  ctx.font=`600 7px 'Orbitron',monospace`; ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.fillText('MOVE',VW*0.22,panelY+6); ctx.fillText('FIRE',VW*0.78,panelY+6);
  ctx.globalAlpha=gamePaused?0.6:0.18; ctx.fillText('PAUSE',pp.x,panelY+6);

  ctx.restore();
}

function drawJoystick() {
  drawControlPanel();
  const sp=getStickPos(), fp=getFirePos();

  // Left stick base ring
  ctx.save();
  ctx.globalAlpha=0.12; ctx.fillStyle='#00cfff';
  ctx.beginPath(); ctx.arc(sp.x,sp.y,STICK_BASE_R,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=leftStick.active?0.55:0.28; ctx.strokeStyle='#00cfff'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(sp.x,sp.y,STICK_BASE_R,0,Math.PI*2); ctx.stroke();
  ctx.globalAlpha=0.15; ctx.lineWidth=1;
  ctx.beginPath();
  ctx.moveTo(sp.x-STICK_BASE_R+8,sp.y); ctx.lineTo(sp.x+STICK_BASE_R-8,sp.y);
  ctx.moveTo(sp.x,sp.y-STICK_BASE_R+8); ctx.lineTo(sp.x,sp.y+STICK_BASE_R-8);
  ctx.stroke(); ctx.restore();

  // Knob
  const kx=leftStick.active?leftStick.baseX+leftStick.dx*STICK_MAX_R:sp.x;
  const ky=leftStick.active?leftStick.baseY+leftStick.dy*STICK_MAX_R:sp.y;
  ctx.save();
  ctx.globalAlpha=leftStick.active?0.75:0.35; ctx.fillStyle='#00cfff';
  ctx.shadowColor='#00cfff'; ctx.shadowBlur=leftStick.active?18:6;
  ctx.beginPath(); ctx.arc(kx,ky,KNOB_R,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=leftStick.active?0.4:0.15; ctx.fillStyle='#ffffff'; ctx.shadowBlur=0;
  ctx.beginPath(); ctx.arc(kx-KNOB_R*0.25,ky-KNOB_R*0.25,KNOB_R*0.35,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // Fire button
  const firing=rightStick.active;
  let hasTarget=false;
  if (game.player&&game.enemies) {
    hasTarget=nearbyEnemies(game.player.x,game.player.y,game.player.weaponRange)
      .some(e=>Math.hypot(e.x-game.player.x,e.y-game.player.y)<game.player.weaponRange);
  }
  const fireColor=firing?'#ffffff':hasTarget?'#ff6040':'#00cfff';
  ctx.save();
  ctx.globalAlpha=firing?0.28:hasTarget?0.18:0.10; ctx.fillStyle=fireColor;
  ctx.beginPath(); ctx.arc(fp.x,fp.y,FIRE_R,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=firing?0.95:hasTarget?0.7:0.32; ctx.strokeStyle=fireColor;
  ctx.lineWidth=firing?2.5:1.5; ctx.shadowColor=fireColor; ctx.shadowBlur=firing?24:hasTarget?14:4;
  ctx.beginPath(); ctx.arc(fp.x,fp.y,FIRE_R,0,Math.PI*2); ctx.stroke();
  ctx.globalAlpha=firing?0.5:0.15; ctx.shadowBlur=0;
  ctx.beginPath(); ctx.arc(fp.x,fp.y,FIRE_R*0.6,0,Math.PI*2); ctx.stroke();
  ctx.globalAlpha=firing?1.0:hasTarget?0.7:0.3; ctx.fillStyle=fireColor;
  ctx.shadowColor=fireColor; ctx.shadowBlur=firing?12:4;
  ctx.font=`bold 10px 'Orbitron',monospace`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('FIRE',fp.x,fp.y); ctx.restore();

  // Pause button
  const pp=getPausePos(), paused=gamePaused;
  ctx.save();
  ctx.globalAlpha=paused?0.9:0.35; ctx.fillStyle='#00cfff';
  ctx.shadowColor='#00cfff'; ctx.shadowBlur=paused?16:6;
  ctx.beginPath(); ctx.arc(pp.x,pp.y,PAUSE_R,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=paused?0.6:0.2; ctx.fillStyle='#ffffff'; ctx.shadowBlur=0;
  ctx.beginPath(); ctx.arc(pp.x-PAUSE_R*0.25,pp.y-PAUSE_R*0.25,PAUSE_R*0.4,0,Math.PI*2); ctx.fill();
  ctx.restore();
}


// ┌─────────────────────────────────────────────────────────────────┐
// │  SECTION 17 — BOOTSTRAP                                         │
// └─────────────────────────────────────────────────────────────────┘
resize();
document.getElementById('start-btn').addEventListener('click', startGame);
</script>
